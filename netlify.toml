[build]
  publish = "."
  command = "echo 'No build required'"

[[redirects]]
  from = "/api/*"
  to = "https://votre-api-backend.herokuapp.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
